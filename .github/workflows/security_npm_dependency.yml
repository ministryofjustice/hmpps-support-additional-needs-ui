name: Security npm dependency check
on:
  workflow_dispatch:
  schedule:
    - cron: "27 3 * * MON-FRI" # Every weekday
jobs:
  security-npm-dependency-check:
    name: Project security npm dependency check
    uses: ministryofjustice/hmpps-github-actions/.github/workflows/security_npm_dependency.yml@d79e83be2cc392b981dd92c8f6f85007d18032e9 # v2 WORKFLOW_VERSION
    with:
      channel_id: ${{ vars.SECURITY_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
    secrets: inherit
